<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سجل الشركات</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #2563eb; --brand-light: #eff6ff; --brand-dark: #1d4ed8;
      --green: #16a34a; --green-light: #f0fdf4;
      --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
      --gray-400: #9ca3af; --gray-600: #4b5563; --gray-800: #1f2937;
      --radius: 10px;
    }
    body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: var(--gray-50); color: var(--gray-800); min-height: 100vh; }

    /* Nav */
    nav { background: white; border-bottom: 1px solid var(--gray-200); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1rem; }
    .nav-logo .dot { width: 32px; height: 32px; background: var(--brand); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .nav-links { display: flex; gap: 6px; }
    .nav-links a { padding: 7px 14px; border-radius: 7px; font-size: 0.87rem; color: var(--gray-600); text-decoration: none; transition: background 0.15s; }
    .nav-links a:hover { background: var(--gray-100); }
    .nav-links a.active { background: var(--brand-light); color: var(--brand); font-weight: 600; }

    /* Page */
    .page { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
    .page-header { margin-bottom: 1.75rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .page-header h1 { font-size: 1.4rem; font-weight: 700; }
    .page-header p { font-size: 0.87rem; color: var(--gray-400); margin-top: 3px; }

    /* Stats */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 1.75rem; }
    .stat-card { background: white; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 1rem 1.25rem; }
    .stat-card .num { font-size: 1.6rem; font-weight: 700; color: var(--brand); }
    .stat-card .lbl { font-size: 0.8rem; color: var(--gray-400); margin-top: 3px; }

    /* Search */
    .search-bar { position: relative; margin-bottom: 1.25rem; }
    .search-bar input { width: 100%; padding: 10px 14px 10px 40px; border: 1px solid var(--gray-200); border-radius: var(--radius); font-size: 0.9rem; background: white; outline: none; font-family: inherit; }
    .search-bar input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
    .search-bar .ico { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--gray-400); font-size: 1rem; pointer-events: none; }

    /* Table */
    .table-wrap { background: white; border: 1px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead tr { background: var(--gray-100); }
    th { padding: 11px 16px; text-align: right; font-weight: 600; color: var(--gray-600); white-space: nowrap; border-bottom: 1px solid var(--gray-200); font-size: 0.82rem; }
    td { padding: 13px 16px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gray-50); }

    /* Company cell */
    .company-cell { display: flex; align-items: center; gap: 10px; }
    .company-avatar { width: 36px; height: 36px; border-radius: 9px; background: var(--brand-light); color: var(--brand); font-weight: 700; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .company-name { font-weight: 600; font-size: 0.9rem; }

    /* Badge */
    .badge { display: inline-flex; align-items: center; gap: 5px; background: var(--green-light); color: var(--green); font-size: 0.75rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; }

    /* Btn open */
    .btn-open { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; background: var(--brand); color: white; border: none; border-radius: 7px; font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s; text-decoration: none; white-space: nowrap; }
    .btn-open:hover { background: var(--brand-dark); }

    /* Modal overlay */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.open { display: flex; }
    .modal { background: white; border-radius: 14px; width: 100%; max-width: 860px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
    .modal-head { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--gray-200); display: flex; align-items: center; justify-content: space-between; }
    .modal-head h2 { font-size: 1rem; font-weight: 700; }
    .modal-head .meta { font-size: 0.8rem; color: var(--gray-400); margin-top: 3px; }
    .modal-close { width: 32px; height: 32px; border: none; background: var(--gray-100); border-radius: 7px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
    .modal-close:hover { background: var(--gray-200); }
    .modal-body { overflow: auto; padding: 1.25rem 1.5rem; flex: 1; }
    .modal-table-wrap { border: 1px solid var(--gray-200); border-radius: 8px; overflow: auto; }
    .modal-table-wrap table th { background: var(--gray-100); }

    /* Empty / Loading */
    .empty { text-align: center; padding: 4rem 1rem; color: var(--gray-400); }
    .empty .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty p { font-size: 0.9rem; }
    .loading { text-align: center; padding: 3rem; color: var(--gray-400); font-size: 0.9rem; }

    /* Spinner */
    .spinner { width: 20px; height: 20px; border: 2px solid var(--gray-200); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .date-cell { color: var(--gray-400); font-size: 0.82rem; }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="dot">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M3 3h8v8H3V3zm0 10h8v8H3v-8zm10-10h8v8h-8V3zm0 10h8v8h-8v-8z"/></svg>
    </div>
    نظام رفع الملفات
  </div>
  <div class="nav-links">
    <a href="index.html">رفع ملف</a>
    <a href="dashboard.html" class="active">سجل الشركات</a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <h1>سجل الشركات</h1>
      <p>كل الشركات والملفات المرفوعة</p>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="num" id="stat-companies">-</div><div class="lbl">شركة</div></div>
    <div class="stat-card"><div class="num" id="stat-uploads">-</div><div class="lbl">ملف مرفوع</div></div>
    <div class="stat-card"><div class="num" id="stat-rows">-</div><div class="lbl">إجمالي الصفوف</div></div>
  </div>

  <div class="search-bar">
    <span class="ico">🔍</span>
    <input type="text" id="search" placeholder="ابحث باسم الشركة أو اسم الملف..." />
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>الشركة</th>
          <th>اسم الملف</th>
          <th>عدد الصفوف</th>
          <th>تاريخ الرفع</th>
          <th>فتح</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="5"><div class="loading"><div class="spinner"></div></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-head">
      <div>
        <h2 id="modal-title">-</h2>
        <div class="meta" id="modal-meta"></div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div id="modal-content"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

  const SUPABASE_URL  = "https://bokvvoarjuwwffbvmlhm.supabase.co"
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJva3Z2b2FyanV3d2ZmYnZtbGhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyODQ4MTksImV4cCI6MjA5Njg2MDgxOX0.4hRPq76ihgxuXmHUc2CaMAg5N5NUrfQa0dLuagAsGx4"
  const db = createClient(SUPABASE_URL, SUPABASE_ANON)

  let allData = []

  async function loadData() {
    const { data, error } = await db
      .from("uploads")
      .select("id, file_name, row_count, columns, created_at, companies(id, name)")
      .order("created_at", { ascending: false })

    if (error) { showError(error.message); return }
    allData = data || []
    renderStats()
    renderTable(allData)
  }

  function renderStats() {
    const companies = new Set(allData.map(r => r.companies?.id)).size
    const totalRows = allData.reduce((s, r) => s + (r.row_count || 0), 0)
    document.getElementById("stat-companies").textContent = companies
    document.getElementById("stat-uploads").textContent = allData.length
    document.getElementById("stat-rows").textContent = totalRows.toLocaleString("ar-EG")
  }

  function renderTable(rows) {
    const tbody = document.getElementById("table-body")
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty"><div class="icon">📂</div><p>مفيش بيانات لحد دلوقتي</p></div></td></tr>`
      return
    }
    tbody.innerHTML = rows.map(r => {
      const name = r.companies?.name || "-"
      const initials = name.slice(0,2)
      const date = new Date(r.created_at).toLocaleDateString("ar-EG", { year:"numeric", month:"short", day:"numeric" })
      return `<tr>
        <td>
          <div class="company-cell">
            <div class="company-avatar">${initials}</div>
            <div class="company-name">${name}</div>
          </div>
        </td>
        <td><span class="badge">📄 ${r.file_name}</span></td>
        <td>${(r.row_count||0).toLocaleString("ar-EG")} صف</td>
        <td class="date-cell">${date}</td>
        <td><button class="btn-open" onclick="openFile('${r.id}', '${r.file_name}', '${name}', ${r.row_count})">👁 عرض</button></td>
      </tr>`
    }).join("")
  }

  // Search
  document.getElementById("search").addEventListener("input", e => {
    const q = e.target.value.toLowerCase()
    renderTable(allData.filter(r =>
      (r.companies?.name||"").toLowerCase().includes(q) ||
      (r.file_name||"").toLowerCase().includes(q)
    ))
  })

  // Open file modal
  window.openFile = async (uploadId, fileName, companyName, rowCount) => {
    document.getElementById("modal-title").textContent = fileName
    document.getElementById("modal-meta").textContent = `${companyName} — ${rowCount} صف`
    document.getElementById("modal-content").innerHTML = `<div class="loading"><div class="spinner"></div></div>`
    document.getElementById("modal").classList.add("open")

    const { data, error } = await db
      .from("upload_rows")
      .select("row_data, row_index")
      .eq("upload_id", uploadId)
      .order("row_index", { ascending: true })
      .limit(500)

    if (error || !data.length) {
      document.getElementById("modal-content").innerHTML = `<div class="empty"><p>مفيش بيانات</p></div>`
      return
    }

    const headers = Object.keys(data[0].row_data)
    const html = `
      <div class="modal-table-wrap">
        <table>
          <thead><tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr></thead>
          <tbody>${data.map(r=>`<tr>${headers.map(h=>`<td>${r.row_data[h]??""}</td>`).join("")}</tr>`).join("")}</tbody>
        </table>
      </div>
      ${rowCount > 500 ? `<p style="font-size:0.8rem;color:var(--gray-400);margin-top:0.75rem;">عارض أول 500 صف من ${rowCount}</p>` : ""}
    `
    document.getElementById("modal-content").innerHTML = html
  }

  document.getElementById("modal-close").addEventListener("click", () => {
    document.getElementById("modal").classList.remove("open")
  })
  document.getElementById("modal").addEventListener("click", e => {
    if (e.target === document.getElementById("modal")) document.getElementById("modal").classList.remove("open")
  })

  function showError(msg) {
    document.getElementById("table-body").innerHTML = `<tr><td colspan="5"><div class="empty"><p>❌ ${msg}</p></div></td></tr>`
  }

  loadData()
</script>
</body>
</html>
