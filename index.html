<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>رفع بيانات الشركة</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #2563eb; --brand-light: #eff6ff; --brand-dark: #1d4ed8;
      --success: #16a34a; --success-light: #f0fdf4;
      --danger: #dc2626; --danger-light: #fef2f2;
      --warning: #d97706;
      --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb;
      --gray-400: #9ca3af; --gray-600: #4b5563; --gray-800: #1f2937;
      --radius: 10px;
    }
    body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: var(--gray-50); color: var(--gray-800); min-height: 100vh; padding: 2rem 1rem; }
    nav { background: white; border-bottom: 1px solid var(--gray-200); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
    .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1rem; }
    .nav-logo .dot { width: 32px; height: 32px; background: var(--brand); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    .nav-links { display: flex; gap: 6px; }
    .nav-links a { padding: 7px 14px; border-radius: 7px; font-size: 0.87rem; color: var(--gray-600); text-decoration: none; transition: background 0.15s; }
    .nav-links a:hover { background: var(--gray-100); }
    .nav-links a.active { background: var(--brand-light); color: var(--brand); font-weight: 600; }

    .container { max-width: 760px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 2.5rem; }
    .header .logo { width: 56px; height: 56px; background: var(--brand); border-radius: 14px; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
    .header h1 { font-size: 1.6rem; font-weight: 700; }
    .header p { font-size: 0.9rem; color: var(--gray-400); margin-top: 0.3rem; }
    .card { background: white; border-radius: var(--radius); border: 1px solid var(--gray-200); padding: 1.75rem; margin-bottom: 1.25rem; }
    .card-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px; }
    .step { width: 24px; height: 24px; background: var(--brand); color: white; border-radius: 50%; font-size: 0.75rem; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; }
    label { display: block; font-size: 0.85rem; color: var(--gray-600); margin-bottom: 6px; font-weight: 500; }
    input[type="text"] { width: 100%; padding: 10px 14px; border: 1px solid var(--gray-200); border-radius: 8px; font-size: 0.95rem; color: var(--gray-800); background: var(--gray-50); outline: none; font-family: inherit; }
    input[type="text"]:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); background: white; }
    .drop-zone { border: 2px dashed var(--gray-200); border-radius: var(--radius); padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--gray-50); position: relative; }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--brand); background: var(--brand-light); }
    .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-zone p { font-size: 0.9rem; color: var(--gray-600); }
    .drop-zone span { font-size: 0.8rem; color: var(--gray-400); }
    .file-name { margin-top: 0.75rem; font-size: 0.85rem; font-weight: 600; color: var(--brand); }
    #preview-section { display: none; }
    .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--gray-200); }
    table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    thead tr { background: var(--gray-100); }
    th { padding: 10px 14px; text-align: right; font-weight: 600; color: var(--gray-600); white-space: nowrap; border-bottom: 1px solid var(--gray-200); }
    td { padding: 9px 14px; border-bottom: 1px solid var(--gray-100); white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    .btn-submit { width: 100%; padding: 13px; background: var(--brand); color: white; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s; }
    .btn-submit:hover:not(:disabled) { background: var(--brand-dark); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }
    .stats-row { display: flex; gap: 10px; margin-bottom: 1rem; }
    .stat { flex: 1; background: var(--gray-50); border: 1px solid var(--gray-200); border-radius: 8px; padding: 10px 14px; }
    .stat .num { font-size: 1.25rem; font-weight: 700; color: var(--brand); }
    .stat .lbl { font-size: 0.75rem; color: var(--gray-400); margin-top: 2px; }
    #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px); padding: 12px 20px; border-radius: var(--radius); font-size: 0.9rem; font-weight: 500; transition: transform 0.3s ease; z-index: 9999; white-space: nowrap; }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { background: var(--success-light); color: var(--success); border: 1px solid #86efac; }
    #toast.error { background: var(--danger-light); color: var(--danger); border: 1px solid #fca5a5; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <nav>
  <div class="nav-logo">
    <div class="dot">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M3 3h8v8H3V3zm0 10h8v8H3v-8zm10-10h8v8h-8V3zm0 10h8v8h-8v-8z"/></svg>
    </div>
    نظام رفع الملفات
  </div>
  <div class="nav-links">
    <a href="index.html">رفع ملف</a>
    <a href="dashbord.html" class="active">سجل الشركات</a>
  </div>
</nav>

<div class="container">
  <div class="header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M3 3h8v8H3V3zm0 10h8v8H3v-8zm10-10h8v8h-8V3zm0 10h8v8h-8v-8z"/></svg>
    </div>
    <h1>رفع بيانات الشركة</h1>
    <p>أدخل اسم الشركة وارفع ملف Excel — هيتحفظ في Supabase</p>
  </div>

  <div class="card">
    <div class="card-title"><span class="step">١</span> اسم الشركة</div>
    <label for="company-name">اسم الشركة</label>
    <input type="text" id="company-name" placeholder="مثال: شركة النيل للتجارة" />
  </div>

  <div class="card">
    <div class="card-title"><span class="step">٢</span> ملف Excel</div>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".xlsx,.xls,.csv" />
      <p>اسحب الملف هنا أو اضغط للاختيار</p>
      <span>xlsx, xls, csv</span>
      <div class="file-name" id="file-name"></div>
    </div>
  </div>

  <div class="card" id="preview-section">
    <div class="card-title">معاينة البيانات</div>
    <div class="stats-row" id="stats-row"></div>
    <div class="table-wrap">
      <table><thead id="table-head"></thead><tbody id="table-body"></tbody></table>
    </div>
    <p style="font-size:0.8rem;color:var(--gray-400);margin-top:0.75rem;" id="preview-note"></p>
  </div>

  <button class="btn-submit" id="submit-btn" disabled>💾 حفظ في Supabase</button>
</div>

<div id="toast"></div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

  // ====== ضع بياناتك هنا ======
  const SUPABASE_URL  = "https://bokvvoarjuwwffbvmlhm.supabase.co"
  const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJva3Z2b2FyanV3d2ZmYnZtbGhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyODQ4MTksImV4cCI6MjA5Njg2MDgxOX0.4hRPq76ihgxuXmHUc2CaMAg5N5NUrfQa0dLuagAsGx4"
  // =============================

  const db = createClient(SUPABASE_URL, SUPABASE_ANON)

  let parsedRows = [], parsedHeaders = [], selectedFile = null

  const dropZone    = document.getElementById("drop-zone")
  const fileInput   = document.getElementById("file-input")
  const fileNameEl  = document.getElementById("file-name")
  const previewSec  = document.getElementById("preview-section")
  const tableHead   = document.getElementById("table-head")
  const tableBody   = document.getElementById("table-body")
  const statsRow    = document.getElementById("stats-row")
  const previewNote = document.getElementById("preview-note")
  const submitBtn   = document.getElementById("submit-btn")
  const companyInput= document.getElementById("company-name")
  const toast       = document.getElementById("toast")

  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover") })
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"))
  dropZone.addEventListener("drop", e => { e.preventDefault(); dropZone.classList.remove("dragover"); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]) })
  fileInput.addEventListener("change", () => { if(fileInput.files[0]) handleFile(fileInput.files[0]) })
  companyInput.addEventListener("input", updateBtn)

  function handleFile(file) {
    const ext = file.name.split(".").pop().toLowerCase()
    if (!["xlsx","xls","csv"].includes(ext)) { showToast("نوع الملف مش مدعوم", "error"); return }
    selectedFile = file
    fileNameEl.textContent = "📄 " + file.name
    const reader = new FileReader()
    reader.onload = e => {
      const wb = XLSX.read(new Uint8Array(e.target.result), { type: "array" })
      const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" })
      if (!json.length) { showToast("الملف فاضي!", "error"); return }
      parsedHeaders = Object.keys(json[0])
      parsedRows = json
      renderPreview()
      updateBtn()
    }
    reader.readAsArrayBuffer(file)
  }

  function renderPreview() {
    statsRow.innerHTML = `
      <div class="stat"><div class="num">${parsedRows.length}</div><div class="lbl">صف</div></div>
      <div class="stat"><div class="num">${parsedHeaders.length}</div><div class="lbl">عمود</div></div>
      <div class="stat"><div class="num">${(selectedFile.size/1024).toFixed(1)} KB</div><div class="lbl">الحجم</div></div>`
    tableHead.innerHTML = `<tr>${parsedHeaders.map(h=>`<th>${h}</th>`).join("")}</tr>`
    tableBody.innerHTML = parsedRows.slice(0,10).map(r=>`<tr>${parsedHeaders.map(h=>`<td>${r[h]??""}</td>`).join("")}</tr>`).join("")
    previewNote.textContent = parsedRows.length > 10 ? `عارض أول 10 صفوف — هيترفعوا كل الـ ${parsedRows.length}` : ""
    previewSec.style.display = "block"
  }

  function updateBtn() {
    submitBtn.disabled = !(companyInput.value.trim() && parsedRows.length)
  }

  submitBtn.addEventListener("click", async () => {
    const name = companyInput.value.trim()
    if (!name || !parsedRows.length) return
    setLoading(true)
    try {
      const { data: co, error: e1 } = await db.from("companies").insert({ name }).select().single()
      if (e1) throw e1

      const { data: up, error: e2 } = await db.from("uploads").insert({
        company_id: co.id, file_name: selectedFile.name,
        row_count: parsedRows.length, columns: parsedHeaders
      }).select().single()
      if (e2) throw e2

      for (let i = 0; i < parsedRows.length; i += 500) {
        const chunk = parsedRows.slice(i, i+500).map((row, idx) => ({
          upload_id: up.id, company_id: co.id,
          row_index: i+idx, row_data: row
        }))
        const { error: e3 } = await db.from("upload_rows").insert(chunk)
        if (e3) throw e3
      }

      showToast(`✅ تم! ${parsedRows.length} صف اتحفظوا`, "success")
      parsedRows=[]; parsedHeaders=[]; selectedFile=null
      companyInput.value=""; fileNameEl.textContent=""; fileInput.value=""
      previewSec.style.display="none"; updateBtn()
    } catch(err) {
      console.error(err)
      showToast("❌ " + (err.message || "حصل خطأ"), "error")
    } finally { setLoading(false) }
  })

  function setLoading(on) {
    if (on) { submitBtn.disabled=true; submitBtn.innerHTML=`<div class="spinner"></div> جاري الحفظ...` }
    else { submitBtn.innerHTML=`💾 حفظ في Supabase`; updateBtn() }
  }

  let tt
  function showToast(msg, type) {
    toast.textContent=msg; toast.className=`${type} show`
    clearTimeout(tt); tt=setTimeout(()=>toast.classList.remove("show"), 4000)
  }
</script>
</body>
</html>
